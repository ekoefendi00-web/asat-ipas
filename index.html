<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASAT 2026 - SDN NGASEM I</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --accent: #f59e0b;
            --bg: #f1f5f9; --text-main: #1e293b; --white: #ffffff;
            --danger: #ef4444; --success: #10b981; --border: #e2e8f0;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; user-select: none; color: var(--text-main); overflow-x: hidden; touch-action: manipulation; }

        /* Overlay Anti-Curang */
        #cheat-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); 
            color: white; z-index: 9999; justify-content: center; align-items: center; text-align: center;
            padding: 30px; backdrop-filter: blur(15px);
        }

        /* Halaman Login */
        #login-page {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .logo-tutwuri { width: 70px; height: auto; margin-bottom: 15px; }

        /* Header */
        header { 
            background: var(--white); border-bottom: 2px solid var(--border); padding: 0 20px; 
            display: none; justify-content: space-between; align-items: center; height: 70px;
            position: sticky; top: 0; z-index: 100;
        }
        .timer-box { background: #fff1f2; padding: 8px 12px; border-radius: 10px; border: 1px solid #ffe4e6; font-weight: 800; font-size: 1.1rem; color: var(--danger); font-family: monospace; }

        /* Main Layout */
        .main-wrapper { display: none; min-height: calc(100vh - 70px); padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        .soal-section { flex: 3; background: white; border-radius: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .soal-content { flex: 1; padding: 20px; font-size: 1.1rem; line-height: 1.6; }
        
        .opt-item { border: 1px solid var(--border); padding: 14px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .opt-item.selected { background: #eff6ff; border: 2px solid var(--primary); font-weight: 600; }
        .opt-label { min-width: 30px; height: 30px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .selected .opt-label { background: var(--primary); color: white; border-color: var(--primary); }

        /* Sidebar Navigasi */
        .sidebar { flex: 1; background: white; border-radius: 15px; padding: 20px; max-width: 300px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 90px; }
        .grid-nomor { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .btn-nomor { aspect-ratio: 1/1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.8rem; background: white; }
        .btn-nomor.active { border: 2px solid var(--primary); color: var(--primary); outline: 2px solid rgba(37, 99, 235, 0.2); }
        .btn-nomor.filled { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nomor.doubt { background: var(--accent); color: white; border-color: var(--accent); }

        /* Responsif HP */
        @media (max-width: 768px) {
            header { height: 60px; padding: 0 15px; }
            #user-display { font-size: 0.8rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .timer-box { font-size: 1rem; }
            .main-wrapper { flex-direction: column; padding: 10px; }
            .sidebar { max-width: 100%; position: static; order: 2; margin-top: 10px; }
            .soal-section { order: 1; min-height: 450px; }
            .grid-nomor { grid-template-columns: repeat(6, 1fr); }
            .opt-item { padding: 12px; font-size: 1rem; }
        }

        #result-page { display: none; max-width: 500px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 10px; border: 2px solid var(--border); font-size: 1rem; resize: none; }
        textarea:focus { outline: none; border-color: var(--primary); }
    </style>
</head>
<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;">

<div id="cheat-overlay">
    <div>
        <h1 style="font-size: 3rem; margin: 0;">⚠️</h1>
        <h2>PELANGGARAN TERDETEKSI</h2>
        <p>Jangan keluar dari aplikasi atau membuka notifikasi!</p>
        <button type="button" onclick="closeOverlay()" style="padding: 12px 30px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold;">SAYA MENGERTI</button>
    </div>
</div>

<div id="login-page">
    <div class="login-card">
        <img src="https://awsimages.detik.net.id/community/media/visual/2023/05/02/lambang-tut-wuri-handayani.png?w=700&q=90" class="logo-tutwuri" alt="Logo">
        <h2 style="color: var(--primary); margin: 0;">ASAT IPAS 2026</h2>
        <p style="margin-top: 5px; color: #64748b; font-size: 0.9rem;">SD NEGERI NGASEM I</p>
        
        <div style="text-align: left; margin-top: 20px;">
            <label style="font-weight: bold; font-size: 0.8rem;">Nama Lengkap</label>
            <input type="text" id="stu-name" style="width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem;" placeholder="Nama sesuai absen..." autocomplete="off">
            <label style="font-weight: bold; font-size: 0.8rem;">Nomor Peserta</label>
            <input type="text" id="stu-id" style="width: 100%; padding: 12px; margin: 5px 0 20px 0; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem;" placeholder="Contoh: 01-001" autocomplete="off">
        </div>
        
        <button type="button" onclick="startExam()" style="width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; font-size: 1rem;">MASUK UJIAN</button>
    </div>
</div>

<header id="exam-header">
    <div>
        <small style="color: #64748b; font-weight: bold; font-size: 0.65rem;">PESERTA</small>
        <div id="user-display" style="font-weight: 800; color: var(--primary);">NAMA PESERTA</div>
    </div>
    <div class="timer-box" id="timer">90:00</div>
</header>

<div class="main-wrapper" id="exam-body">
    <div class="soal-section">
        <div style="padding: 12px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span id="header-no" style="font-weight: 800;">SOAL NO 1</span>
            <span id="q-type" style="background: #e0f2fe; color: var(--primary); font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; font-weight: bold;">PILIHAN GANDA</span>
        </div>
        <div class="soal-content" id="content-area"></div>
        <div style="padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: #f8fafc;">
            <button type="button" id="btn-prev" onclick="nav(-1)" style="padding: 12px; border: none; border-radius: 8px; background: #e2e8f0; font-weight: 700; cursor: pointer; min-width: 80px;">KEMBALI</button>
            <button type="button" onclick="toggleDoubt()" style="padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer;">RAGU</button>
            <button type="button" id="btn-next" onclick="handleNext()" style="flex-grow: 1; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 700; cursor: pointer;">SELANJUTNYA</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span>NAVIGASI</span> 
            <span id="progress" style="color: var(--primary);">0/50</span>
        </div>
        <div class="grid-nomor" id="nav-grid"></div>
        <button type="button" onclick="confirmFinish()" style="width: 100%; margin-top: 20px; padding: 12px; border-radius: 10px; border: none; background: var(--danger); color: white; font-weight: 700; cursor: pointer;">KIRIM JAWABAN</button>
    </div>
</div>

<div id="result-page">
    <h2 style="color: var(--primary);">TERIMA KASIH</h2>
    <p>Jawaban Anda telah berhasil dikirim.</p>
    <div style="font-size: 4rem; font-weight: 900; color: var(--success); margin: 15px 0;" id="final-score">0</div>
    <div id="result-stats" style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem;"></div>
    <button type="button" onclick="location.reload()" style="width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold;">KEMBALI KE BERANDA</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRsXCe_Wwfp55Qzny3txTow63C9fTee0SpRqGElnsXwJnE4pCDaNX4IlB_XnSrxYehjQ/exec"; 

    const bankSoal = [
        // ... (data soal sama seperti sebelumnya) ...
        { id: 1, type: 'pg', q: "Arah rotasi bumi berawal dari arah….", o: ["timur", "barat", "utara", "selatan"], a: "B" },
        { id: 2, type: 'pg', q: "Setiap hari, Arianti melihat matahari terbit dari timur dan tenggelam di barat. Peristiwa tersebut dinamakan….", o: ["gerak semu tahunan matahari", "gerak semu bulan", "gerak semu harian matahari", "gerak semu harian bumi"], a: "C" },
        { id: 3, type: 'pg', q: "Revolusi bumi artinya….", o: ["perputaran bumi pada porosnya", "perputaran bulan mengelilingi bumi", "perputaran bumi mengelilingi matahari", "perputaran bulan pada sumbunya"], a: "C" },
        { id: 4, type: 'pg', q: "Waktu revolusi dan rotasi bulan yang terjadi bersamaan mengakibatkan….", o: ["permukaan bulan yang menghadap ke bumi selalu sama", "bentuk bulan yang nampak berubah-ubah bentuknya", "terjadinya gerhana matahari disetiap tahun", "permukaan bulan nampak selalu bersinar terang"], a: "A" },
        { id: 5, type: 'pg', q: "Gerhana bulan terjadi karena….", o: ["sinar bulan menjadi redup karena kalah dengan sinar matahari", "sinar matahari tidak bisa sampai ke bumi karena terhalang oleh posisi bulan", "sinar matahari tidak bisa sampai ke bulan karena terhalang oleh posisi bumi", "permukaan bulan yang memantulkan sinar matahari adalah permukaan yang gelap"], a: "C" },
        { id: 6, type: 'pg', q: "Garis khayal yang membagi bumi menjadi belahan utara dan selatan dinamakan garis….", o: ["khatulistiwa", "bujur", "lintang", "vertikal"], a: "A" },
        { id: 7, type: 'pg', q: "Keistimewaan daerah yang dilalui garis khatulistiwa yaitu….", o: ["curah hujan rendah", "beriklim sub tropis", "beriklim tropis", "suhu udara rendah"], a: "C" },
        { id: 8, type: 'pg', q: "Poros bumi mempunyai kemiringan sebesar….", o: ["25,30", "24,30", "25,40", "23,50"], a: "D" },
        { id: 9, type: 'pg', q: "Bumi berputar pada porosnya, hal tersebut terjadi karena….", o: ["gaya gravitasi bumi dan bulan", "gaya gravitasi bumi dan matahari", "gaya gravitasi bumi, bulan dan matahari", "gaya gravitasi bulan dan matahari"], a: "B" },
        { id: 10, type: 'pg', q: "Berdasarkan letak astronomis,ada 3 pembagian zona waktu di Indonesia yaitu WIB,WITA dan WIT. Berikut ini merupakan daerah yang termasuk WIB yaitu….", o: ["Sumatera, Jawa, Kalimantan Barat dan Maluku", "Sumatera, Jawa, Kalimantan Selatan dan Kalimantan Tengah", "Sumatera, Jawa, Kalimantan Barat dan Kalimantan Utara", "Sumatera, Jawa, Kalimantan Barat dan Kalimantan Tengah"], a: "D" },
        { id: 11, type: 'pg', q: "Masing-masing bagian wilayah waktu Indonesia yang bersebelahan memiliki perbedaan waktu… jam", o: ["1", "2", "3", "4"], a: "A" },
        { id: 12, type: 'pg', q: "Bila di daerah Jakarta pukul 01.00 WIB maka saat ini di daerah Jayapura pukul….", o: ["02.00", "03.00", "04.00", "05.00"], a: "B" },
        { id: 13, type: 'pg', q: "Iklim Negara Indonesia yaitu….", o: ["sub tropis", "dingin", "sedang", "tropis"], a: "D" },
        { id: 14, type: 'pg', q: "Pada Negara-negara yang beriklim tropis memiliki musim….", o: ["salju", "kemarau", "semi", "gugur"], a: "B" },
        { id: 15, type: 'pg', q: "Benda langit yang tersusun atas debu dan gas yang membeku yaitu….", o: ["planet", "komet", "meteor", "satelit"], a: "B" },
        { id: 16, type: 'pg', q: "Benda langit yang dapat memancarkan cahayanya sendiri disebut….", o: ["bulan", "asteroid", "meteorit", "bintang"], a: "D" },
        { id: 17, type: 'pg', q: "Benda langit yang tidak habis terbakar ketika memasuki atmosfer bumi dan jatuh di permukaan bumi disebut….", o: ["meteoroid", "komet", "bulan", "planet"], a: "A" },
        { id: 18, type: 'pg', q: "Setiap planet memiliki orbit masing-masing. Orbit adalah….", o: ["garis edar", "garis lurus", "lokasi", "bintang"], a: "A" },
        { id: 19, type: 'pg', q: "Kumpulan dari matahari, planet dan benda langit lainnya disebut….", o: ["Satelit", "bima sakti", "galaksi", "tata surya"], a: "D" },
        { id: 20, type: 'pg', q: "Planet yang memiliki ciri khas cincin yang besar adalah….", o: ["Uranus", "Neptunus", "Saturnus", "Mars"], a: "C" },
        { id: 21, type: 'pg', q: "Pada tahun 2006 para ilmuwan sepakat bahwa pluto bukan planet karena….", o: ["ukuran yang kecil", "tidak memiliki bulan", "terlalu berat", "tidak membersihkan lingkungan orbitnya"], a: "D" },
        { id: 22, type: 'pg', q: "Planet yang paling jauh dari Matahari adalah....", o: ["Mars", "Venus", "Uranus", "Neptunus"], a: "D" },
        { id: 23, type: 'pg', q: "Energi sangat penting bagi kehidupan manusia karena….", o: ["digunakan untuk bermain", "membantu menjalankan aktifitas", "kurang peran", "hanya untuk lampu"], a: "B" },
        { id: 24, type: 'pg', q: "Bagaimana energi air bisa berubah menjadi energi listrik?", o: ["panel surya", "turbin air", "pembakaran", "panas bumi"], a: "B" },
        { id: 25, type: 'pg', q: "Perubahan energi pada kipas angin yaitu….", o: ["listrik - angin", "gerak - angin", "angin - gerak", "listrik - gerak"], a: "D" },
        { id: 26, type: 'pg', q: "Bahan bakar fosil terdiri dari….", o: ["bensin, batu bara, pasir", "gas, minyak goreng, batu bara", "gas alam, minyak bumi, batubara", "minyak bumi, batu bara, solar"], a: "C" },
        { id: 27, type: 'pg', q: "Dampak negatif dari penggunaan energi fosil yaitu….", o: ["bau wangi", "polusi", "oksigen", "hangat"], a: "B" },
        { id: 28, type: 'pg', q: "Energi geothermal adalah….", o: ["gerak benda", "panas matahari", "panas bumi", "angin"], a: "C" },
        { id: 29, type: 'pg', q: "Benda yang termasuk sumber energi tak terbatas yaitu….", o: ["bensin", "solar", "angin", "batu bara"], a: "C" },
        { id: 30, type: 'pg', q: "Penyemprotan hama berlebihan membuat hama menjadi….", o: ["Resistan", "Mati", "Hilang", "Lemah"], a: "A" },
        { id: 31, type: 'pg', q: "Contoh tindakan manusia pemicu pemanasan global yaitu….", o: ["pertanian", "perindangan", "bersih sampah", "industri"], a: "D" },
        { id: 32, type: 'pg', q: "Mengurangi dampak buruk deforestasi dengan cara….", o: ["penghijauan", "perindangan", "kebersihan", "reboisasi"], a: "D" },
        { id: 33, type: 'pg', q: "Cara tepat mengatasi banyaknya sampah plastik yaitu….", o: ["daur ulang", "buang jauh", "bakar", "ke laut"], a: "A" },
        { id: 34, type: 'pg', q: "Bergantinya musim kemarau ke penghujan akibat ....", o: ["regulasi", "rotasi", "revolusi", "reformasi"], a: "C" },
        { id: 35, type: 'pg', q: "Satelit alami bumi adalah ....", o: ["matahari", "bulan", "artemis", "appolo"], a: "B" },
        { id: 36, type: 'isian', q: "Perubahan musim merupakan dampak terjadinya….", a: "revolusi bumi" },
        { id: 37, type: 'isian', q: "Kalender Hijriah dihitung berdasarkan waktu….", a: "revolusi bulan" },
        { id: 38, type: 'isian', q: "Tugu Khatulistiwa terletak di kota….", a: "pontianak" },
        { id: 39, type: 'isian', q: "Bojonegoro termasuk wilayah waktu ....", a: "WIB" },
        { id: 40, type: 'isian', q: "Sabuk Asteroid berada di antara planet … dan ….", a: "mars dan jupiter" },
        { id: 41, type: 'isian', q: "Benda langit pengiring planet dinamakan….", a: "satelit" },
        { id: 42, type: 'isian', q: "Urutan Bumi dalam tata surya adalah ke….", a: "tiga" },
        { id: 43, type: 'isian', q: "Planet 'Bintang Kejora' adalah….", a: "venus" },
        { id: 44, type: 'isian', q: "Energi listrik dari kincir angin disebut energi….", a: "bayu" },
        { id: 45, type: 'isian', q: "Faktor utama perubahan lingkungan adalah faktor alam dan faktor….", a: "manusia" },
        { id: 46, type: 'uraian', q: "Jelaskan penyebab terjadinya pergantian siang dan malam!", a: null },
        { id: 47, type: 'uraian', q: "Jelaskan posisi Matahari, Bumi, dan Bulan saat terjadi Gerhana Bulan!", a: null },
        { id: 48, type: 'uraian', q: "Tuliskan nama-nama planet secara berurutan!", a: null },
        { id: 49, type: 'uraian', q: "Sebutkan 3 aktivitas manusia yang merusak lingkungan!", a: null },
        { id: 50, type: 'uraian', q: "Sebutkan 2 cara menyelamatkan ekosistem sungai!", a: null }
    ];

    let current = 0;
    let answers = JSON.parse(localStorage.getItem('cbt_ans')) || {};
    let doubts = JSON.parse(localStorage.getItem('cbt_dbt')) || {};

    document.addEventListener("visibilitychange", () => {
        if (document.hidden && !localStorage.getItem('cbt_finished')) {
            document.getElementById('cheat-overlay').style.display = 'flex';
        }
    });

    function closeOverlay() { document.getElementById('cheat-overlay').style.display = 'none'; }

    function startExam() {
        const n = document.getElementById('stu-name').value.trim();
        const i = document.getElementById('stu-id').value.trim();
        if(!n || !i) { alert("Lengkapi Nama dan Nomor Peserta!"); return; }
        
        document.getElementById('user-display').innerText = n.toUpperCase();
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('exam-header').style.display = 'flex';
        document.getElementById('exam-body').style.display = 'flex';
        
        initNav(); render(0); startTimer(90); 
    }

    function render(idx) {
        current = idx;
        const s = bankSoal[idx];
        document.getElementById('header-no').innerText = `SOAL NO ${idx + 1}`;
        document.getElementById('q-type').innerText = s.type.toUpperCase();
        
        const area = document.getElementById('content-area');
        let html = `<div style="font-weight:600; margin-bottom:15px; color:#334155;">${s.q}</div>`;

        if (s.type === 'pg') {
            const labels = ['A', 'B', 'C', 'D'];
            s.o.forEach((opt, i) => {
                const lbl = labels[i];
                html += `
                    <div class="opt-item ${answers[idx] === lbl ? 'selected' : ''}" onclick="saveAns('${lbl}')">
                        <div class="opt-label">${lbl}</div>
                        <div style="flex-grow:1;">${opt}</div>
                    </div>`;
            });
        } else {
            // Ditambahkan autocapitalize="none" dan spellcheck="false" agar input HP lebih stabil
            html += `<textarea id="ans-text" oninput="saveAns(this.value, false)" 
                    placeholder="Tulis jawaban Anda di sini..." 
                    autocapitalize="none" 
                    spellcheck="false"
                    >${answers[idx] || ''}</textarea>`;
        }
        area.innerHTML = html;
        updateNavUI();
        window.scrollTo(0,0);
    }

    function saveAns(v, refresh = true) {
        answers[current] = v;
        localStorage.setItem('cbt_ans', JSON.stringify(answers));
        if(refresh) render(current);
        updateNavUI();
    }

    function toggleDoubt() {
        doubts[current] = !doubts[current];
        localStorage.setItem('cbt_dbt', JSON.stringify(doubts));
        updateNavUI();
    }

    function initNav() {
        const g = document.getElementById('nav-grid'); g.innerHTML = "";
        bankSoal.forEach((_, i) => {
            const d = document.createElement('div'); d.className = 'btn-nomor'; d.id = `n-${i}`; 
            d.innerText = i + 1; d.onclick = () => render(i); g.appendChild(d);
        });
    }

    function updateNavUI() {
        let count = 0;
        bankSoal.forEach((_, i) => {
            const el = document.getElementById(`n-${i}`); if(!el) return;
            el.className = 'btn-nomor';
            if(i === current) el.classList.add('active');
            if(answers[i] && answers[i].toString().trim() !== "") { el.classList.add('filled'); count++; }
            if(doubts[i]) el.classList.add('doubt');
        });
        document.getElementById('progress').innerText = `${count}/${bankSoal.length}`;
        document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
    }

    function handleNext() {
        if (current === bankSoal.length - 1) confirmFinish();
        else nav(1);
    }

    function nav(d) {
        let n = current + d; 
        if(n >= 0 && n < bankSoal.length) render(n); 
    }

    function startTimer(m) {
        let t = m * 60;
        const iv = setInterval(() => {
            if(localStorage.getItem('cbt_finished')) { clearInterval(iv); return; }
            let mn = Math.floor(t/60); let s = t%60;
            document.getElementById('timer').innerText = `${mn}:${s<10?'0':''}${s}`;
            if(t-- <= 0) { clearInterval(iv); confirmFinish(true); }
        }, 1000);
    }

    function confirmFinish(auto = false) {
        if(!auto && !confirm("Yakin ingin menyelesaikan ujian?")) return;
        
        localStorage.setItem('cbt_finished', 'true');
        let correct = 0;
        bankSoal.forEach((s, i) => { 
            if(i < 45) { // Hanya PG dan Isian
                const u = (answers[i] || "").toString().toLowerCase().trim();
                if(s.type === 'pg' && u === s.a.toLowerCase()) correct++;
                else if(s.type === 'isian' && u === s.a.toLowerCase()) correct++;
            }
        });

        const skor = Math.round((correct / 45) * 100);
        document.getElementById('exam-body').style.display = 'none';
        document.getElementById('exam-header').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('final-score').innerText = skor;
        document.getElementById('result-stats').innerHTML = `Benar: ${correct} dari 45 soal (PG & Isian).<br>Uraian akan diperiksa oleh guru secara manual.`;
        
        // Opsional: Kirim ke Google Sheets
        if(SCRIPT_URL !== "URL_APPS_SCRIPT_ANDA") {
            fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ 
                    nama: document.getElementById('stu-name').value, 
                    id: document.getElementById('stu-id').value,
                    skor: skor, 
                    jawaban: answers 
                })
            });
        }
    }
</script>
